<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Downloader | Nawab ZADA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; }
        .banner { background: linear-gradient(45deg, #ff0000, #1a1a1a); padding: 60px 10px; border-bottom: 5px solid #ff0000; box-shadow: 0 10px 20px rgba(255,0,0,0.3); }
        .dev-tag { font-size: 1.6rem; color: #00ff00; font-weight: bold; margin-top: 15px; text-shadow: 2px 2px #000; }
        .main-card { background: #111; border: 1px solid #333; border-radius: 25px; padding: 40px; margin-top: -50px; position: relative; z-index: 10; }
        .btn-vip { background: #ff0000; color: white; font-weight: bold; font-size: 1.3rem; border: none; padding: 15px; transition: 0.3s; }
        .btn-vip:hover { background: #cc0000; transform: scale(1.05); }
        .thumb-img { width: 100%; border-radius: 15px; margin-bottom: 20px; border: 2px solid #444; }
        input.form-control { background: #222 !important; color: white !important; border: 1px solid #444; height: 55px; font-size: 1.1rem; }
        #loader { font-size: 1.1rem; color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <div class="banner">
        <h1 style="font-weight: 900; letter-spacing: 2px;">🦅 SOCIAL MEDIA VIDEO DOWNLOADER 🦅</h1>
        <div class="dev-tag">Developer: Nawab ZADA 🦅🙌</div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5 main-card shadow-lg">
                <p class="text-muted mb-4">Paste any link to download HD Video directly to Gallery</p>
                
                <input type="text" id="url" class="form-control mb-4" placeholder="YouTube, FB, Insta, TikTok link...">
                
                <button onclick="getHDLink()" class="btn btn-vip w-100 rounded-pill">🚀 DOWNLOAD IN HD</button>
                
                <div id="loader" class="mt-4" style="display:none;">Jani Sabar kro, HD link nikal rha hoon... ⏳</div>
                <div id="result" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        async function getHDLink() {
            const url = document.getElementById('url').value;
            const resDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            if(!url) return alert("Jani link to dalo!");
            
            loader.style.display = "block";
            resDiv.innerHTML = "";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `url=${encodeURIComponent(url)}`
                });
                const data = await response.json();
                loader.style.display = "none";

                if(data.download_link) {
                    resDiv.innerHTML = `
                        <img src="${data.thumbnail}" class="thumb-img">
                        <h6 class="text-white mb-3">${data.title}</h6>
                        <a href="${data.download_link}" target="_blank" download="${data.title}.mp4" class="btn btn-success btn-lg w-100 fw-bold">📥 SAVE TO GALLERY</a>
                        <p class="small text-muted mt-3">Note: Agar video browser mein play ho jaye, to 3-dots par click karke "Download" daben ya Long Press karke "Download Video" karein.</p>
                    `;
                } else {
                    resDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            } catch (e) {
                loader.style.display = "none";
                alert("Network error! Try again.");
            }
        }
    </script>
</body>
</html>
